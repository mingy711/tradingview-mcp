name: Upstream Tracker

on:
  schedule:
    - cron: '0 8 * * *'  # daily at 08:00 UTC
  workflow_dispatch:      # allow manual trigger

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read

    steps:
      - name: Check upstream for new PRs and commits
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPSTREAM: tradesdontlie/tradingview-mcp
          FORK: iliaal/tradingview-mcp
        run: |
          # Get open PRs on upstream
          PRS=$(gh pr list --repo "$UPSTREAM" --state open --json number,title,createdAt,url \
            --jq 'map(select(.createdAt > (now - 86400*7 | todate))) | sort_by(.number) | reverse')

          PR_COUNT=$(echo "$PRS" | jq 'length')

          # Get latest upstream commit SHA and message
          UPSTREAM_SHA=$(gh api repos/$UPSTREAM/commits/main --jq '.sha[0:7]')
          UPSTREAM_MSG=$(gh api repos/$UPSTREAM/commits/main --jq '.commit.message | split("\n")[0]')
          UPSTREAM_DATE=$(gh api repos/$UPSTREAM/commits/main --jq '.commit.committer.date')

          # Get our fork's merge base (last time we synced with upstream)
          FORK_BASE=$(gh api repos/$FORK/compare/main...$(gh api repos/$UPSTREAM/commits/main --jq '.sha') \
            --jq '.behind_by' 2>/dev/null || echo "unknown")

          echo "pr_count=$PR_COUNT" >> $GITHUB_OUTPUT
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "upstream_msg=$UPSTREAM_MSG" >> $GITHUB_OUTPUT
          echo "upstream_date=$UPSTREAM_DATE" >> $GITHUB_OUTPUT
          echo "behind_by=$FORK_BASE" >> $GITHUB_OUTPUT

          # Save PR list for issue body
          echo "$PRS" > /tmp/prs.json

      - name: Check if issue already exists for today
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORK: iliaal/tradingview-mcp
        run: |
          TODAY=$(date +%Y-%m-%d)
          EXISTING=$(gh issue list --repo "$FORK" --label "upstream-tracker" --state open \
            --json title --jq "[.[] | select(.title | contains(\"$TODAY\"))] | length")
          echo "exists=$EXISTING" >> $GITHUB_OUTPUT

      - name: Ensure upstream-tracker label exists
        if: steps.existing.outputs.exists == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORK: iliaal/tradingview-mcp
        run: |
          gh label create upstream-tracker \
            --repo "$FORK" \
            --color "0E8A16" \
            --description "Daily upstream PR/commit snapshot (auto-generated)" \
            2>/dev/null || true

      - name: Create tracking issue
        if: steps.existing.outputs.exists == '0'
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORK: iliaal/tradingview-mcp
          UPSTREAM: tradesdontlie/tradingview-mcp
        run: |
          TODAY=$(date +%Y-%m-%d)
          PR_COUNT=${{ steps.check.outputs.pr_count }}
          UPSTREAM_SHA=${{ steps.check.outputs.upstream_sha }}
          UPSTREAM_MSG="${{ steps.check.outputs.upstream_msg }}"
          UPSTREAM_DATE=${{ steps.check.outputs.upstream_date }}
          BEHIND_BY=${{ steps.check.outputs.behind_by }}

          # Build PR table
          PR_TABLE=$(cat /tmp/prs.json | jq -r '.[] | "| #\(.number) | \(.title) | \(.createdAt[0:10]) | [\(.url)](\(.url)) |"')

          BODY=$(cat <<EOF
          ## Upstream Status — $TODAY

          | | |
          |---|---|
          | Latest upstream commit | \`$UPSTREAM_SHA\` — $UPSTREAM_MSG |
          | Commit date | $UPSTREAM_DATE |
          | Fork is behind by | $BEHIND_BY commits |

          ## Open PRs on upstream (last 7 days, $PR_COUNT total)

          | # | Title | Date | Link |
          |---|-------|------|------|
          $PR_TABLE

          ## Action required?

          Review the PRs above and decide which to cherry-pick into this fork.
          Our custom patches (tab-switch CDP reconnect, adaptive compile wait, DOM strategy scraper) may conflict — verify before merging.

          To cherry-pick a PR locally:
          \`\`\`bash
          git fetch upstream
          git cherry-pick <commit-sha>
          \`\`\`

          _Auto-generated by upstream-tracker workflow. Prior daily snapshots are auto-closed by the next run._
          EOF
          )

          ISSUE_URL=$(gh issue create \
            --repo "$FORK" \
            --title "Upstream tracker — $TODAY ($PR_COUNT open PRs, $BEHIND_BY commits behind)" \
            --body "$BODY" \
            --label "upstream-tracker")
          echo "issue_url=$ISSUE_URL" >> $GITHUB_OUTPUT
          NEW_NUMBER=$(basename "$ISSUE_URL")
          echo "issue_number=$NEW_NUMBER" >> $GITHUB_OUTPUT

      - name: Close prior tracker issues
        if: steps.existing.outputs.exists == '0' && steps.create.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORK: iliaal/tradingview-mcp
          NEW_NUMBER: ${{ steps.create.outputs.issue_number }}
        run: |
          # Match by title prefix so we also catch legacy unlabeled trackers.
          PRIOR=$(gh issue list --repo "$FORK" --state open --limit 100 \
            --search 'in:title "Upstream tracker —"' \
            --json number --jq "[.[] | select(.number != $NEW_NUMBER) | .number] | .[]")
          for n in $PRIOR; do
            gh issue close "$n" --repo "$FORK" --reason "not planned" \
              --comment "Superseded by #$NEW_NUMBER (next daily upstream-tracker snapshot)."
          done
